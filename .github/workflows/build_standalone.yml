name: Build Standalone
on:
  workflow_dispatch:
jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            architecture: x64
          - os: windows-latest
            architecture: x64
    runs-on: ${{ matrix.os }}
    steps:

      ########################################
      # NSIS installer (Windows, always x86) #
      ########################################
      - name: Install NSIS
        if: matrix.os == 'windows-latest'
        run: |
          curl -L "https://downloads.sourceforge.net/project/nsis/NSIS%203/3.10/nsis-3.10.zip" -o C:\WINDOWS\Temp\nsis-3.10.zip
          Expand-Archive -LiteralPath "C:\WINDOWS\Temp\nsis-3.10.zip" -DestinationPath "C:\WINDOWS\Temp\unzip-nsis-3.10"
          Move-Item -Path "C:\WINDOWS\Temp\unzip-nsis-3.10\nsis-3.10" -Destination "C:\Program Files (x86)\NSIS"
      - name: Check out SimpleFC repository (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/checkout@v6
        with:
          repository: mazinsw/SimpleFC
      - name: Build SimpleFC NSIS Plugin (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          copy "bin\x86-unicode\SimpleFC.dll" "C:\Program Files (x86)\NSIS\Plugins\x86-unicode\SimpleFC.dll"
      - name: Check out nsProcess repository (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/checkout@v6
        with:
          repository: simdsoft/nsProcess
          submodules: 'true'
      - name: Add msbuild to PATH (Windows)
        if: matrix.os == 'windows-latest'
        uses: microsoft/setup-msbuild@v2
      - name: Build nsProcess NSIS Plugin (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd nsProcess
          msbuild nsProcess.vcxproj /p:PlatformToolset=v143 /p:Configuration="Release UNICODE"
          copy "Release UNICODE\nsProcess.dll" "C:\Program Files (x86)\NSIS\Plugins\x86-unicode\nsProcess.dll"
          cd ../Include
          New-Item -ItemType Directory -Force -Path "C:\Program Files (x86)\NSIS\Include"
          copy nsProcess.nsh "C:\Program Files (x86)\NSIS\Include\nsProcess.nsh"

      #######################
      # Package preparation #
      #######################
      - name: Check-out repository
        uses: actions/checkout@v6
        with:
          submodules: 'true'
          fetch-tags: 'true'
      - name: Remove test files
        shell: bash
        run: |
          rm -rf doc
          rm -rf scripts

          rm src/run_unit_tests.py
          rm -rf src/tribler/test_integration
          rm -rf src/tribler/test_unit

          rm -rf pyipv8/.github
          rm pyipv8/.gitignore
          rm pyipv8/.gitmodules
          rm pyipv8/.readthedocs.yaml
          rm pyipv8/.ruff.toml
          rm pyipv8/*.md
          rm pyipv8/*.ini
          rm pyipv8/create_test_coverage_report.py
          rm pyipv8/github_increment_version.py
          rm pyipv8/run_all_tests.py
          rm pyipv8/setup.py
          rm -rf pyipv8/doc
          rm -rf pyipv8/scripts
          rm -rf pyipv8/stresstest
          rm -rf pyipv8/systemd
          rm -rf pyipv8/ipv8/test
      - name: Setup Python ${{ matrix.architecture }}
        if: matrix.architecture != 'aarch64'
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          architecture: ${{ matrix.architecture }}
          cache: 'pip'
          cache-dependency-path: |
            **/build/requirements.txt
      - name: Install Dependencies
        if: matrix.architecture != 'aarch64'
        shell: bash
        run: |
          pip install --upgrade -r build/requirements.txt
          pip install PySide6 python-mpv qasync
      - name: Stamp release
        shell: python
        env:
          GITHUB_BUILD_NUMBER: ${{ github.run_number }}
        run: |
          import fileinput, os
          with fileinput.input('src/tribler/ui/src/pages/Settings/Versions.tsx', inplace=True) as file:
            for line in file:
              new_line = line.replace('<Label key="version_build_stamp"></Label>',
                                      f'<Label key="version_build_stamp">build #{os.getenv("GITHUB_BUILD_NUMBER")}</Label>')
              print(new_line, end='')
      - name: Setup npm
        uses: actions/setup-node@v6
      - name: Build npm
        shell: bash
        run: |
          cd src/tribler/ui/
          npm install
          npm run build
          rm -rf node_modules
      - name: Determine release tag
        shell: bash
        run: |
          git fetch --no-tags origin 'refs/tags/v*:refs/tags/v*'
          git for-each-ref --count=1 --sort=-creatordate --format '%(refname)' refs/tags > raw_tag.txt
          GITHUB_TAG=$(git name-rev --tags --name-only $(cat raw_tag.txt))
          echo "GITHUB_TAG=${GITHUB_TAG#v}" >> $GITHUB_ENV

      #####################
      # Individual builds #
      #####################
      - name: Build Executables (Ubuntu x64)
        if: matrix.os == 'ubuntu-latest' && matrix.architecture == 'x64'
        env:
          TRIBLER_BUILD_MODE: standalone
        run: |
          sudo apt-get update -q -y
          sudo apt-get install -y --allow-downgrades alien devscripts fakeroot gir1.2-gtk-3.0 libgirepository1.0-dev rpm libmpv-dev mpv libcairo2-dev pkg-config
          ./build/debian/makedist_debian.sh
          
          cd build/debian
          sudo apt-get install -y --fix-broken ./tribler-standalone_${GITHUB_TAG}_all.deb
          timeout 10s tribler -s || true
          cat /tmp/*tribler*.log
          
          mv tribler-standalone_${GITHUB_TAG}_all.deb tribler-standalone_${GITHUB_TAG}_x64.deb
      - name: Fetch MPV
        if: matrix.os == 'windows-latest'
        run: |
          curl -L "https://github.com/shinchiro/mpv-winbuild-cmake/releases/download/20260525/mpv-dev-x86_64-20260525-git-1ac687d.7z" -o C:\Temp_mpv.7z
          7z e C:\Temp_mpv.7z *.dll -osrc -r -y
          if (Test-Path src\libmpv-*.dll) { Move-Item src\libmpv-*.dll src\mpv-1.dll -Force }
          if (Test-Path src\mpv-*.dll) { Move-Item src\mpv-*.dll src\mpv-1.dll -Force }
      - name: Build Executables (Windows)
        if: matrix.os == 'windows-latest'
        env:
          TRIBLER_BUILD_MODE: standalone
        run: |
          ./build/win/makedist_win.bat

      ################################
      # Cleanup and artifact uploads #
      ################################
      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ runner.os }}-${{ matrix.architecture }}-Standalone-Build
          path: |
            dist/*.exe
            dist/*.dmg
            build/debian/*.deb
            dist/*.apk
